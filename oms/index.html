<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Nhập liệu OMS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #16a34a;
            --info-color: #0ea5e9;
            --danger-color: #dc2626;
            --bg-color: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
        }

        body { background-color: var(--bg-color); font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: var(--text-main); }

        .oms-form-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .oms-header { border-bottom: 2px solid var(--bg-color); margin-bottom: 25px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .oms-header h2 { margin: 0; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }

        .form-section { margin-bottom: 30px; }
        .form-section h3 { font-size: 1.1rem; margin-bottom: 15px; color: var(--secondary-color); border-left: 4px solid var(--primary-color); padding-left: 10px; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group.full-width { grid-column: span 2; }
        .input-group label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }

        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .readonly { background-color: #f1f5f9; cursor: not-allowed; }

        /* Table & Autocomplete */
        .search-cell { position: relative; }
        .product-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .product-table th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid var(--border-color); }
        .product-table td { padding: 10px; border-bottom: 1px solid var(--border-color); }
        
        .autocomplete-suggestions {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            border: 1px solid #ddd; border-radius: 4px; max-height: 200px;
            overflow-y: auto; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none;
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .suggestion-item:hover { background-color: #f1f5f9; }
        .suggestion-item strong { display: block; font-size: 0.8em; color: var(--secondary-color); }

        /* Summary & Buttons */
        .summary-box { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .summary-item.total { border-top: 2px solid var(--border-color); padding-top: 10px; font-weight: bold; color: var(--danger-color); font-size: 1.2rem; }

        .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        
        button { border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-add-item { background: white; border: 1px dashed var(--primary-color); color: var(--primary-color); margin-bottom: 10px; }
        .btn-add-item:hover { background: #eff6ff; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-print { background: var(--info-color); color: white; }
        .btn-excel { background: var(--success-color); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--secondary-color); }
        .btn-remove { background: #fee2e2; color: var(--danger-color); padding: 5px 10px; }

        /* Media Query for Printing */
        @media print {
            body { background: white; padding: 0; }
            .form-actions, .btn-add-item, .btn-remove, .autocomplete-suggestions { display: none !important; }
            .oms-form-container { box-shadow: none; width: 100%; border: none; }
            input, select, textarea { border: none !important; appearance: none; }
        }
    </style>
</head>
<body>

<div class="oms-form-container">
    <div class="oms-header">
        <h2><i class="fas fa-file-invoice"></i> Form Nhập Đơn Hàng</h2>
        <span id="order-date"></span>
    </div>

    <form id="oms-input-form">
        <div class="form-section">
            <h3>Thông tin khách hàng</h3>
            <div class="form-grid">
                <div class="input-group">
                    <label>Số điện thoại</label>
                    <input type="text" id="cust-phone" placeholder="090x xxx xxx" required>
                </div>
                <div class="input-group">
                    <label>Tên khách hàng</label>
                    <input type="text" id="cust-name" placeholder="Nguyễn Văn A">
                </div>
                <div class="input-group full-width">
                    <label>Địa chỉ giao hàng</label>
                    <input type="text" id="cust-address" placeholder="Số nhà, tên đường, phường/xã...">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Chi tiết sản phẩm</h3>
            <table class="product-table">
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th width="150">SKU</th>
                        <th width="100">Số lượng</th>
                        <th width="150">Đơn giá</th>
                        <th width="40"></th>
                    </tr>
                </thead>
                <tbody id="product-body">
                    <tr>
                        <td class="search-cell">
                            <input type="text" class="product-search" placeholder="Gõ tìm sản phẩm...">
                            <div class="autocomplete-suggestions"></div>
                        </td>
                        <td><input type="text" readonly class="readonly sku-field" value=""></td>
                        <td><input type="number" class="qty-input" value="1" min="1"></td>
                        <td><input type="text" class="price-input" value="0"></td>
                        <td><button type="button" class="btn-remove"><i class="fas fa-trash"></i></button></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="btn-add-item" id="add-row-btn"><i class="fas fa-plus"></i> Thêm sản phẩm</button>
        </div>

        <div class="form-section">
            <div class="form-grid">
                <div class="input-group">
                    <label>Ghi chú</label>
                    <textarea id="order-note" rows="4" placeholder="Ghi chú đơn hàng hoặc yêu cầu giao hàng..."></textarea>
                </div>
                <div class="summary-box">
                    <div class="summary-item">
                        <span>Tạm tính:</span>
                        <span id="subtotal-display">0đ</span>
                    </div>
                    <div class="summary-item">
                        <span>Phí giao hàng:</span>
                        <input type="number" id="shipping-fee" class="shipping-input" value="0" style="width: 100px; text-align: right;">
                    </div>
                    <div class="summary-item total">
                        <span>TỔNG CỘNG:</span>
                        <span id="total-display">0đ</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Làm mới</button>
            <button type="button" class="btn-excel" id="export-excel-btn"><i class="fas fa-file-excel"></i> Xuất Excel</button>
            <button type="button" class="btn-print" id="print-btn"><i class="fas fa-print"></i> In đơn hàng</button>
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Lưu & Đẩy đơn</button>
        </div>
    </form>
</div>

<script>
// 1. Dữ liệu sản phẩm giả lập
const productsDatabase = [
    { name: "iPhone 15 Pro Max", sku: "IP15PM-256", price: 28000000 },
    { name: "Samsung Galaxy S24 Ultra", sku: "SS-S24U", price: 26500000 },
    { name: "Tai nghe Airpods Pro", sku: "AP-PRO-2", price: 5500000 },
    { name: "Ốp lưng Magsafe", sku: "CASE-MS", price: 1200000 },
    { name: "Sạc nhanh 20W", sku: "CHARGER-20W", price: 490000 }
];

document.addEventListener('DOMContentLoaded', function() {
    const productBody = document.getElementById('product-body');
    const orderDate = document.getElementById('order-date');
    orderDate.innerText = "Ngày: " + new Date().toLocaleDateString('vi-VN');

    // --- HÀM TÍNH TOÁN ---
    function calculateTotal() {
        let subtotal = 0;
        document.querySelectorAll('#product-body tr').forEach(row => {
            const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            subtotal += qty * price;
        });

        const shipping = parseFloat(document.getElementById('shipping-fee').value) || 0;
        const total = subtotal + shipping;

        document.getElementById('subtotal-display').innerText = subtotal.toLocaleString('vi-VN') + 'đ';
        document.getElementById('total-display').innerText = total.toLocaleString('vi-VN') + 'đ';
    }

    // --- THÊM DÒNG MỚI ---
    document.getElementById('add-row-btn').addEventListener('click', () => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="search-cell">
                <input type="text" class="product-search" placeholder="Gõ tìm sản phẩm...">
                <div class="autocomplete-suggestions"></div>
            </td>
            <td><input type="text" readonly class="readonly sku-field" value=""></td>
            <td><input type="number" class="qty-input" value="1" min="1"></td>
            <td><input type="text" class="price-input" value="0"></td>
            <td><button type="button" class="btn-remove"><i class="fas fa-trash"></i></button></td>
        `;
        productBody.appendChild(tr);
    });

    // --- AUTOCOMPLETE & XỬ LÝ BẢNG ---
    productBody.addEventListener('input', function(e) {
        if (e.target.classList.contains('product-search')) {
            const keyword = e.target.value.toLowerCase();
            const suggestionBox = e.target.nextElementSibling;
            
            if (keyword.length < 1) { suggestionBox.style.display = 'none'; return; }

            const matches = productsDatabase.filter(p => p.name.toLowerCase().includes(keyword) || p.sku.toLowerCase().includes(keyword));
            
            if (matches.length > 0) {
                suggestionBox.innerHTML = matches.map(p => `
                    <div class="suggestion-item" data-name="${p.name}" data-sku="${p.sku}" data-price="${p.price}">
                        ${p.name} <strong>Mã: ${p.sku}</strong>
                    </div>
                `).join('');
                suggestionBox.style.display = 'block';
            } else {
                suggestionBox.style.display = 'none';
            }
        }
        calculateTotal();
    });

    productBody.addEventListener('click', function(e) {
        // Chọn sản phẩm từ gợi ý
        const item = e.target.closest('.suggestion-item');
        if (item) {
            const row = item.closest('tr');
            row.querySelector('.product-search').value = item.dataset.name;
            row.querySelector('.sku-field').value = item.dataset.sku;
            row.querySelector('.price-input').value = item.dataset.price;
            item.parentElement.style.display = 'none';
            calculateTotal();
        }
        // Xóa dòng
        if (e.target.closest('.btn-remove')) {
            if (document.querySelectorAll('#product-body tr').length > 1) {
                e.target.closest('tr').remove();
                calculateTotal();
            }
        }
    });

    document.getElementById('shipping-fee').addEventListener('input', calculateTotal);

    // --- XUẤT EXCEL ---
    document.getElementById('export-excel-btn').addEventListener('click', () => {
        const data = [];
        document.querySelectorAll('#product-body tr').forEach(row => {
            if(row.querySelector('.product-search').value) {
                data.push({
                    "Sản phẩm": row.querySelector('.product-search').value,
                    "SKU": row.querySelector('.sku-field').value,
                    "Số lượng": row.querySelector('.qty-input').value,
                    "Đơn giá": row.querySelector('.price-input').value,
                });
            }
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "DonHang");
        XLSX.writeFile(wb, "DonHang_OMS.xlsx");
    });

    // --- IN ĐƠN ---
    document.getElementById('print-btn').addEventListener('click', () => window.print());

    // Click ra ngoài ẩn gợi ý
    document.addEventListener('click', (e) => {
        if (!e.target.classList.contains('product-search')) {
            document.querySelectorAll('.autocomplete-suggestions').forEach(b => b.style.display = 'none');
        }
    });
});
</script>

</body>
</html>
