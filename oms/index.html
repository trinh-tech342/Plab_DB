<div class="oms-form-container">
    <div class="oms-header">
        <h2>Tạo Đơn Hàng Mới</h2>
        <p>Vui lòng nhập đầy đủ thông tin để lưu đơn vào hệ thống.</p>
    </div>

    <form id="oms-input-form">
        <div class="form-section">
            <h3><i class="fas fa-user"></i> Thông tin khách hàng</h3>
            <div class="form-grid">
                <div class="input-group">
                    <label>Số điện thoại</label>
                    <input type="text" placeholder="090x xxx xxx" required>
                </div>
                <div class="input-group">
                    <label>Tên khách hàng</label>
                    <input type="text" placeholder="Nguyễn Văn A">
                </div>
                <div class="input-group full-width">
                    <label>Địa chỉ giao hàng</label>
                    <input type="text" placeholder="Số nhà, tên đường, phường/xã...">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3><i class="fas fa-box"></i> Chi tiết đơn hàng</h3>
            <table class="product-table">
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>SKU</th>
                        <th width="100">Số lượng</th>
                        <th width="150">Đơn giá</th>
                        <th width="50"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" placeholder="Tìm sản phẩm..."></td>
                        <td><input type="text" readonly value="SKU-001" class="readonly"></td>
                        <td><input type="number" value="1" min="1"></td>
                        <td><input type="text" value="500,000" class="price-input"></td>
                        <td><button type="button" class="btn-remove">×</button></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="btn-add-item">+ Thêm sản phẩm</button>
        </div>

        <div class="form-section footer-section">
            <div class="form-grid">
                <div class="input-group">
                    <label>Phương thức thanh toán</label>
                    <select>
                        <option>COD (Thu hộ)</option>
                        <option>Chuyển khoản</option>
                        <option>Ví điện tử</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Ghi chú đơn hàng</label>
                    <textarea rows="3" placeholder="Yêu cầu đặc biệt về giao hàng..."></textarea>
                </div>
                <div class="summary-box">
                    <div class="summary-item"><span>Tạm tính:</span> <span>500,000đ</span></div>
                    <div class="summary-item"><span>Phí ship:</span> <input type="text" value="30,000"></div>
                    <div class="summary-item total"><span>Tổng cộng:</span> <span>530,000đ</span></div>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-secondary">Hủy bỏ</button>
            <button type="submit" class="btn-primary">Lưu & Đẩy đơn</button>
        </div>
    </form>
</div>

<style>
/* CSS Reset & Variable */
:root {
    --primary-color: #2563eb;
    --bg-color: #f8fafc;
    --border-color: #e2e8f0;
    --text-main: #1e293b;
}

.oms-form-container {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    color: var(--text-main);
}

.oms-header { margin-bottom: 25px; border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; }
.oms-header h2 { margin: 0; color: var(--primary-color); }

.form-section { margin-bottom: 30px; }
.form-section h3 { font-size: 1.1rem; margin-bottom: 15px; color: #64748b; }

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.input-group { display: flex; flex-direction: column; }
.input-group.full-width { grid-column: span 2; }
.input-group label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }

input, select, textarea {
    padding: 10px 12px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-size: 14px;
    transition: 0.2s;
}

input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
.readonly { background-color: #f1f5f9; cursor: not-allowed; }

/* Table styling */
.product-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
.product-table th { text-align: left; padding: 10px; background: #f8fafc; border-bottom: 2px solid var(--border-color); }
.product-table td { padding: 10px; border-bottom: 1px solid var(--border-color); }
.product-table input { width: 100%; border: none; padding: 5px; }

.btn-add-item { background: none; border: 1px dashed var(--primary-color); color: var(--primary-color); padding: 8px 15px; border-radius: 6px; cursor: pointer; }

.summary-box { background: #f1f5f9; padding: 20px; border-radius: 8px; }
.summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
.summary-item.total { border-top: 1px solid #cbd5e1; padding-top: 10px; font-weight: bold; color: #dc2626; font-size: 1.2rem; }

.form-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; }
.btn-primary { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 600; cursor: pointer; }
.btn-secondary { background: #e2e8f0; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; }
</style>
